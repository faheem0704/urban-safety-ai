version: '3.8'
services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - USE_FAKE_REDIS=true
      - GMAIL_ADDRESS=${GMAIL_ADDRESS}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - ALERT_RECIPIENT=${ALERT_RECIPIENT}
    volumes:
      - ./outputs:/app/outputs
      - ./models:/app/models
      - ./database:/app/database
    restart: unless-stopped
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
